name: npm 배포

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'npm 배포를 실행하려면 publish를 입력하세요.'
        required: true
        type: string
      tag:
        description: 'npm dist-tag를 선택하세요.'
        required: true
        default: next
        type: choice
        options:
          - next
          - latest

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: ${{ github.ref == 'refs/heads/main' && inputs.confirm == 'publish' }}
    name: npm에 배포
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm-publish

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: pnpm 설정
        uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6

      - name: Node.js 설정
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: 품질 검증
        run: pnpm lint && pnpm typecheck && pnpm test && pnpm build && pnpm test:package

      - name: 미배포 버전 확인
        run: pnpm changeset status --output=changeset-status.json

      - name: 릴리스 채널 확인
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          PRE_MODE=$(node -p "require('./.changeset/pre.json').mode")
          PRE_TAG=$(node -p "require('./.changeset/pre.json').tag")

          if [ "$RELEASE_TAG" = "next" ]; then
            test "$PRE_MODE" = "pre"
            test "$PRE_TAG" = "next"
          else
            test "$PRE_MODE" = "exit"
          fi

      - name: npm에 공개 배포
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          for PACKAGE_DIR in packages/core packages/cli; do
            PACKAGE_NAME=$(node -p "require('./${PACKAGE_DIR}/package.json').name")
            PACKAGE_VERSION=$(node -p "require('./${PACKAGE_DIR}/package.json').version")

            if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
              echo "Skipping ${PACKAGE_NAME}@${PACKAGE_VERSION}; already published."
            else
              pnpm --dir "$PACKAGE_DIR" publish --tag "$RELEASE_TAG" --no-git-checks
            fi
          done

      - name: npm dist-tag 검증
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          CORE_EXPECTED=$(node -p "require('./packages/core/package.json').version")
          CLI_EXPECTED=$(node -p "require('./packages/cli/package.json').version")

          for ATTEMPT in 1 2 3 4 5 6; do
            CORE_ACTUAL=$(npm view "@lyrd/core@${RELEASE_TAG}" version)
            CLI_ACTUAL=$(npm view "@lyrd/cli@${RELEASE_TAG}" version)

            if [ "$CORE_ACTUAL" = "$CORE_EXPECTED" ] && [ "$CLI_ACTUAL" = "$CLI_EXPECTED" ]; then
              exit 0
            fi

            echo "Waiting for npm dist-tags (attempt ${ATTEMPT}/6): core=${CORE_ACTUAL}, cli=${CLI_ACTUAL}"
            sleep 5
          done

          exit 1
